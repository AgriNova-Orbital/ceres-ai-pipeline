<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Change Password - Ceres AI Pipeline</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='wheat_risk_webui.css') }}">
  <style>
    .pw-box { max-width: 400px; margin: 80px auto; padding: 2rem; border: 1px solid #ddd; border-radius: 8px; }
    .pw-box h2 { margin-top: 0; }
    .pw-box label { display: block; margin-bottom: 1rem; }
    .pw-box input[type="password"] { width: 100%; padding: 0.5rem; margin-top: 0.25rem; box-sizing: border-box; }
    .pw-box button { width: 100%; padding: 0.75rem; background: #185574; color: #fff; border: none; border-radius: 4px; cursor: pointer; font-size: 1rem; }
    .pw-box button:hover { background: #143d5a; }
  </style>
</head>
<body>
  <header>
    <h1>Ceres AI Pipeline</h1>
  </header>

  {% with msgs = get_flashed_messages(with_categories=true) %}
  {% if msgs %}
  <section class="flash-list">
    {% for cat, msg in msgs %}
      <div class="flash {{ cat }}">{{ msg }}</div>
    {% endfor %}
  </section>
  {% endif %}
  {% endwith %}

  <main>
    <div class="pw-box">
      <h2>Change Password</h2>
      <form method="post">
        <label>New Password
          <input type="password" name="new_password" required minlength="4">
        </label>
        <label>Confirm Password
          <input type="password" name="confirm_password" required>
        </label>
        <button type="submit">Update Password</button>
      </form>
    </div>
  </main>
</body>
</html>
