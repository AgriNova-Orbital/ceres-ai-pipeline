x-web-healthcheck: &web-healthcheck
  test:
    [
      "CMD",
      "python",
      "-c",
      "import urllib.request; urllib.request.urlopen('http://127.0.0.1:5055/healthz', timeout=3).read()",
    ]
  interval: 10s
  timeout: 5s
  retries: 5
  start_period: 20s

services:
  redis:
    image: redis:7-alpine
    container_name: ceres-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  web-dev:
    profiles: ["dev"]
    build:
      context: .
      target: dev
    container_name: ceres-web-dev
    user: "${LOCAL_UID:-1000}:${LOCAL_GID:-1000}"
    depends_on:
      redis:
        condition: service_healthy
    environment:
      - APP_DB_PATH=/app/state/app.db
      - REDIS_URL=redis://redis:6379/0
      - PYTHONUNBUFFERED=1
      - WEBUI_SECRET_KEY=${WEBUI_SECRET_KEY:-ceres-dev-secret}
      - RQ_LOG_LEVEL=DEBUG
    ports:
      - "5055:5055"
    volumes:
      - ./state:/app/state
      - ./data:/app/data
      - ./runs:/app/runs
      - ./reports:/app/reports
      - ./logs:/app/logs
    healthcheck: *web-healthcheck
    restart: unless-stopped

  worker-dev:
    profiles: ["dev"]
    build:
      context: .
      target: dev
    container_name: ceres-worker-dev
    user: "${LOCAL_UID:-1000}:${LOCAL_GID:-1000}"
    command: ["uv", "run", "python", "-m", "modules.jobs.worker", "redis://redis:6379/0"]
    depends_on:
      redis:
        condition: service_healthy
    environment:
      - APP_DB_PATH=/app/state/app.db
      - REDIS_URL=redis://redis:6379/0
      - PYTHONUNBUFFERED=1
      - RQ_LOG_LEVEL=DEBUG
    volumes:
      - ./state:/app/state
      - ./data:/app/data
      - ./runs:/app/runs
      - ./reports:/app/reports
      - ./logs:/app/logs
    restart: unless-stopped

  frontend-dev:
    profiles: ["dev"]
    build:
      context: ./frontend
    container_name: ceres-frontend-dev
    depends_on:
      web-dev:
        condition: service_healthy
    environment:
      - API_URL=http://web-dev:5055
    ports:
      - "3002:3000"
    restart: unless-stopped

  web-beta:
    profiles: ["beta"]
    build:
      context: .
      target: beta
    container_name: ceres-web-beta
    user: "${LOCAL_UID:-1000}:${LOCAL_GID:-1000}"
    depends_on:
      redis:
        condition: service_healthy
    environment:
      - APP_DB_PATH=/app/state/app.db
      - REDIS_URL=redis://redis:6379/0
      - PYTHONUNBUFFERED=1
      - WEBUI_SECRET_KEY=${WEBUI_SECRET_KEY:-ceres-beta-secret}
      - RQ_LOG_LEVEL=INFO
    ports:
      - "5155:5055"
    volumes:
      - ./state:/app/state
      - ./data:/app/data
      - ./runs:/app/runs
      - ./reports:/app/reports
      - ./logs:/app/logs
    healthcheck: *web-healthcheck
    restart: unless-stopped

  worker-beta:
    profiles: ["beta"]
    build:
      context: .
      target: beta
    container_name: ceres-worker-beta
    user: "${LOCAL_UID:-1000}:${LOCAL_GID:-1000}"
    command: ["uv", "run", "python", "-m", "modules.jobs.worker", "redis://redis:6379/0"]
    depends_on:
      redis:
        condition: service_healthy
    environment:
      - APP_DB_PATH=/app/state/app.db
      - REDIS_URL=redis://redis:6379/0
      - PYTHONUNBUFFERED=1
      - RQ_LOG_LEVEL=INFO
    volumes:
      - ./state:/app/state
      - ./data:/app/data
      - ./runs:/app/runs
      - ./reports:/app/reports
      - ./logs:/app/logs
    restart: unless-stopped

  frontend-beta:
    profiles: ["beta"]
    build:
      context: ./frontend
    container_name: ceres-frontend-beta
    depends_on:
      web-beta:
        condition: service_healthy
    environment:
      - API_URL=http://web-beta:5055
    ports:
      - "3102:3000"
    restart: unless-stopped

  web-release:
    profiles: ["release"]
    build:
      context: .
      target: release
    container_name: ceres-web-release
    user: "${LOCAL_UID:-1000}:${LOCAL_GID:-1000}"
    depends_on:
      redis:
        condition: service_healthy
    environment:
      - APP_DB_PATH=/app/state/app.db
      - REDIS_URL=redis://redis:6379/0
      - PYTHONUNBUFFERED=1
      - WEBUI_SECRET_KEY=${WEBUI_SECRET_KEY:-ceres-release-secret}
      - RQ_LOG_LEVEL=WARNING
    ports:
      - "5255:5055"
