  worker-release:
    profiles: ["release"]
    build:
      context: .
      target: release
    container_name: ceres-worker-release
    user: "${LOCAL_UID:-1000}:${LOCAL_GID:-1000}"
    command: ["uv", "run", "python", "-m", "modules.jobs.worker", "redis://redis:6379/0"]
