services:
  redis:
    image: redis:7-alpine
    container_name: ceres-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  web:
    build: .
    container_name: ceres-web
    command: ["uv", "run", "gunicorn", "--bind", "0.0.0.0:5055", "--workers", "2", "--access-logfile", "-", "--log-level", "debug", "apps.wheat_risk_webui:create_app()"]
    depends_on:
      redis:
        condition: service_healthy
    environment:
      - APP_DB_PATH=/app/state/app.db
      - REDIS_URL=redis://redis:6379/0
      - PYTHONUNBUFFERED=1
      - WEBUI_SECRET_KEY=${WEBUI_SECRET_KEY:-ceres-default-secret}
    expose:
      - "5055"
    volumes:
      - app_state:/app/state
      - ./data:/app/data
      - ./runs:/app/runs
      - ./reports:/app/reports
      - ./logs:/app/logs
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    container_name: ceres-frontend
    depends_on:
      - web
    environment:
      - API_URL=http://web:5055
    ports:
      - "3002:3000"
    restart: unless-stopped

  worker:
    build: .
    container_name: ceres-worker
    command: ["uv", "run", "python", "-m", "modules.jobs.worker", "redis://redis:6379/0"]
    depends_on:
      redis:
        condition: service_healthy
    environment:
      - APP_DB_PATH=/app/state/app.db
      - REDIS_URL=redis://redis:6379/0
      - PYTHONUNBUFFERED=1
      - RQ_LOG_LEVEL=DEBUG
    volumes:
      - app_state:/app/state
      - ./data:/app/data
      - ./runs:/app/runs
      - ./reports:/app/reports
      - ./logs:/app/logs
    deploy:
      resources:
        reservations:
          devices:
            - device_ids:
                - nvidia.com/gpu=all
              capabilities: [gpu]
    restart: unless-stopped

volumes:
  app_state:
