x-web-healthcheck: &web-healthcheck
  test:
    [
      "CMD",
      "python",
      "-c",
      "import urllib.request; urllib.request.urlopen('http://127.0.0.1:5055/healthz', timeout=3).read()",
    ]
  interval: 10s
  timeout: 5s
  retries: 5
  start_period: 20s

services:
  redis:
    image: redis:7-alpine
    container_name: ceres-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  web-dev:
    profiles: ["dev"]
    build:
      context: .
      target: dev
    container_name: ceres-web-dev
    user: "${LOCAL_UID:-1000}:${LOCAL_GID:-1000}"
    depends_on:
      redis:
        condition: service_healthy
    environment:
      - APP_DB_PATH=/app/state/app.db
      - REDIS_URL=redis://redis:6379/0
      - PYTHONUNBUFFERED=1
      - WEBUI_SECRET_KEY=${WEBUI_SECRET_KEY:-ceres-dev-secret}
      - RQ_LOG_LEVEL=DEBUG
      - SENTRY_DSN=${SENTRY_DSN:-}
      - SENTRY_ENVIRONMENT=${SENTRY_ENVIRONMENT:-dev}
      - SENTRY_RELEASE=${SENTRY_RELEASE:-local}
      - SENTRY_TRACES_SAMPLE_RATE=${SENTRY_TRACES_SAMPLE_RATE:-0}
      - NEW_RELIC_LICENSE_KEY=${NEW_RELIC_LICENSE_KEY:-}
      - NEW_RELIC_APP_NAME=${NEW_RELIC_APP_NAME:-Ceres API Dev}
      - NEW_RELIC_LOG=${NEW_RELIC_LOG:-stdout}
      - NEW_RELIC_DISTRIBUTED_TRACING_ENABLED=${NEW_RELIC_DISTRIBUTED_TRACING_ENABLED:-true}
    ports:
      - "5055:5055"
    volumes:
      - ./state:/app/state
      - ./data:/app/data
      - ./runs:/app/runs
      - ./reports:/app/reports
      - ./logs:/app/logs
    healthcheck: *web-healthcheck
    restart: unless-stopped

  worker-dev:
    profiles: ["dev"]
    build:
      context: .
      target: dev
    container_name: ceres-worker-dev
    user: "${LOCAL_UID:-1000}:${LOCAL_GID:-1000}"
    command: ["uv", "run", "python", "-m", "modules.observability", "python", "-m", "modules.jobs.worker", "redis://redis:6379/0"]
    depends_on:
      redis:
        condition: service_healthy
    environment:
      - APP_DB_PATH=/app/state/app.db
      - REDIS_URL=redis://redis:6379/0
      - PYTHONUNBUFFERED=1
      - RQ_LOG_LEVEL=DEBUG
      - SENTRY_DSN=${SENTRY_DSN:-}
      - SENTRY_ENVIRONMENT=${SENTRY_ENVIRONMENT:-dev}
      - SENTRY_RELEASE=${SENTRY_RELEASE:-local}
      - SENTRY_TRACES_SAMPLE_RATE=${SENTRY_TRACES_SAMPLE_RATE:-0}
      - NEW_RELIC_LICENSE_KEY=${NEW_RELIC_LICENSE_KEY:-}
      - NEW_RELIC_APP_NAME=${NEW_RELIC_WORKER_APP_NAME:-Ceres Worker Dev}
      - NEW_RELIC_LOG=${NEW_RELIC_LOG:-stdout}
      - NEW_RELIC_DISTRIBUTED_TRACING_ENABLED=${NEW_RELIC_DISTRIBUTED_TRACING_ENABLED:-true}
    volumes:
      - ./state:/app/state
      - ./data:/app/data
      - ./runs:/app/runs
      - ./reports:/app/reports
      - ./logs:/app/logs
    restart: unless-stopped

  frontend-dev:
    profiles: ["dev"]
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_SENTRY_DSN: ${NEXT_PUBLIC_SENTRY_DSN:-}
        SENTRY_ENVIRONMENT: ${SENTRY_ENVIRONMENT:-dev}
        SENTRY_RELEASE: ${SENTRY_RELEASE:-local}
    container_name: ceres-frontend-dev
    depends_on:
      web-dev:
        condition: service_healthy
    environment:
      - API_URL=http://web-dev:5055
      - NEXT_PUBLIC_SENTRY_DSN=${NEXT_PUBLIC_SENTRY_DSN:-}
      - SENTRY_ENVIRONMENT=${SENTRY_ENVIRONMENT:-dev}
      - SENTRY_RELEASE=${SENTRY_RELEASE:-local}
    ports:
      - "3002:3000"
    restart: unless-stopped

  web-beta:
    profiles: ["beta"]
    build:
      context: .
      target: beta
    container_name: ceres-web-beta
    user: "${LOCAL_UID:-1000}:${LOCAL_GID:-1000}"
