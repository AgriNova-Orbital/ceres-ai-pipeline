services:
  redis:
    image: redis:7-alpine
    container_name: ceres-redis
    restart: unless-stopped
    ports:
      - "6379:6379"

  web:
    build: .
    container_name: ceres-web
    command: ["uv", "run", "gunicorn", "--bind", "0.0.0.0:5055", "--workers", "2", "apps.wheat_risk_webui:create_app()"]
    depends_on:
      - redis
    environment:
      - APP_DB_PATH=/app/state/app.db
      - REDIS_URL=redis://redis:6379/0
      - GOOGLE_OAUTH_CLIENT_SECRET_FILE=/app/state/client_secret.json
    ports:
      - "5055:5055"
    volumes:
      - app_state:/app/state
      - ./data:/app/data
      - ./runs:/app/runs
      - ./reports:/app/reports
      - ./logs:/app/logs
    restart: unless-stopped

  worker:
    build: .
    container_name: ceres-worker
    command: ["uv", "run", "python", "-m", "modules.jobs.worker", "redis://redis:6379/0"]
    depends_on:
      - redis
    environment:
      - APP_DB_PATH=/app/state/app.db
      - REDIS_URL=redis://redis:6379/0
      - GOOGLE_OAUTH_CLIENT_SECRET_FILE=/app/state/client_secret.json
    volumes:
      - app_state:/app/state
      - ./data:/app/data
      - ./runs:/app/runs
      - ./reports:/app/reports
      - ./logs:/app/logs
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped

volumes:
  app_state:
